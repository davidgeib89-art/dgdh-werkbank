commands:
  install: pnpm install
  typecheck: pnpm -r typecheck
  build: pnpm build
  test: pnpm test:run
  lint: echo "No root lint command configured"
  
services:
  paperclip-server:
    start: pnpm dev:server
    stop: taskkill /F /IM node.exe 2>nul || echo "No node processes"
    healthcheck: curl -sf http://localhost:3100/api/health
    port: 3100
    depends_on: []
