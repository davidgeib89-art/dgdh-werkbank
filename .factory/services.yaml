commands:
  install: pnpm install
  typecheck: pnpm typecheck
  build: pnpm build
  test: pnpm test:run
  dev: pnpm dev
  dev_server: pnpm dev:server
  paperclip: pnpm paperclipai

services:
  paperclip_api:
    start: pnpm dev:server
    stop: lsof -ti :3100 | xargs kill 2>/dev/null || true
    healthcheck: curl -sf http://localhost:3100/api/health
    port: 3100
    depends_on: []
