commands:
  install: pnpm install
  typecheck: pnpm typecheck
  build: pnpm build
  test: pnpm test:run
  dev: pnpm dev
  dev_server: pnpm dev:server
  paperclip: pnpm paperclipai

services:
  paperclip_api:
    start: pnpm dev:server
    stop: "Get-Process -Name node | Where-Object {$_.CommandLine -like '*server*'} | Stop-Process"
    healthcheck: Invoke-RestMethod -Uri http://127.0.0.1:3100/api/health -UseBasicParsing
    port: 3100
    depends_on: []
